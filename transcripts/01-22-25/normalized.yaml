ight here, it uses the LLM to do work within it. Say, give me 20 prime numbers, what I've been able to do. And unfortunately it's not working right now. My thing is that it allowed me to extend the functionality to say, maybe I need to know something more timely. Use the web search to be able to search the news and then bring that back. And then my pattern is I will send that up to the large language model to provide a summary. And what I noticed that OpenAI does is they're just sending stuff in the email, man. You set a task, it knows your email, it sends you an alert based on the task. So my inbox is inundated with crap. So they really have not thought much about that. But what is interesting is that we're moving into the space of, okay, it's not predictive, but it is the future. So.
