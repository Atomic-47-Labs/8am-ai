  text: Yeah, that's exactly what I was going to say. Jason said it beautifully. Right? The why question, that's the one I always ask, right? It's a great one for hires, new hires in general. Like, why are you interested in this? Why are we talking about this topic? What does this topic mean to you is another interesting one where it's causing them to throw back and reflect rather than regurgitation. So when I talk biomedical engineering ethics at Waterloo, had all these engineers coming in. This is hard. The hardest, what you're saying is the hardest for STEM people because they've been trained as well that there's one right answer, right? They're trained. Math, brain. There is a right answer and if I have the right equation, I can find the answer. So what is the answer you're looking for from me? But when we get into real world problems, there's usually not just one answer, there's many. And there may be many good answers. There might be one that's slightly better, but it often depends on context, right? So this answer will be better for this context. This other answer will be better for a different context. That is super hard for STEM people to wrap their brains around because then they're like, well, what do you want me to do? Right? Like, how do you want me to answer this if I don't, If I can't give you a right answer, how do I answer this? And to Jason's point, I used to start the whole course by putting a big equation up and then it's got all the steps through and the QED at the bottom. I'm like, you've been trained. You, you get this and then you're asked to get that. I'm like, this course, I don't even care what you get. At the bottom, what I care about is that you can explain to me, as Jason said, how you got there and why you chose the path you did to get there and why you think that this answer is a good one. I'm like, there may be better ones, but what's most important is you can tell me why this, this more subjective, if you will answer is a good one. And So I agree 100%. Critical thinking is like the skill that we have to help people grow in. Because that way we can use AI as a useful companion tool, but we have to critically ask like all the time, is it giving me why? Is it giving me this answer? Does this answer fit in what I'm trying to do? In my context of what I'm trying to do, does this make sense? Like it has to shift a lot away from QED to the, to the why and how questions.
