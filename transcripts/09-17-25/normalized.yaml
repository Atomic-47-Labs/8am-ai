  text: One of the ways that when I. Was teaching that we, I taught in an applied course inside a university. So it was different. It was a two year program and it was more applied. So you learned conceptually and then you applied it. And then the way that you applied it a lot of time was in the context of real world business because it happened to be, you know, about that. And so you're doing that and you have the great opportunity to contextualize your work. And that's, I think, what Jen's saying. The why is a really good contextualizer. If you ask them too many why. Questions and there's five, you can, you know, as a management tool, there's the five whys and you can go down that and you'll just, you'll annoy the fuck out of people. And so what you want to do is you want to give yourself, not to have to, you know, follow the path as well. You want to give them something of a scenario. And the scenario can give them all the why, right? You have the context, you've got this scenario. It's a situation. And they need to act and they. Need to act in a way that is time bound, in a way that is critical. They have to apply critical thinking and. There'S no right way. I went from computer science into marketing. And I was confounded by marketing until I had a girlfriend. And then she just made shit up. And I'm like, well, she's fucking doing stuff. And she was like, welcome to marketing. And I'm like. And then we did the math behind. It, you know, we did some modeling. And then I got on that side of things. But it was, it was this jumping. Of a shark tank for me. But in the situation here, you can give them most of the why control. The answers coming back and still give them all the freedom to get you any answer. That and you will get people that. Are enthusiastic about the path. When I was teaching, everyone loved. When I was a teacher, me being. In university meant I always had good. Employees because if they would be intrigued by the way I taught and they would be intrigued by the way I led. And that's one of the things that we now have to do as leaders of organizations is we have to have teaching baked into the past. When I'm talking about having applied, like not knowing how to use the modern set of tools, it's recognizing the modern context in which they're applying them. And that's, that's the context. That is a big difference. And in management, that's the context you need to work in. Right? You, you're talking about all the time. With AI. It'S moving from observer to actor. And most of the university experience you can be observer. So that's my two thoughts.
