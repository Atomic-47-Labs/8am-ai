e. Room, that was a great meeting. Or, you know, most of us are trying to get to the end of the meeting. So, you know, sometimes it's a full. Flip and just recognizing if we do a really good job of after meeting and before meeting, then we'll enjoy our meeting better. But right now it's a mix of that. It's a mix of listening to somebody like me talk and waiting to talk. Or what I've asked for in my meetings is the. Is the patients to let me talk because it's for the benefit of the transcript and people recognizing that's a modality in a room sometimes. But getting different value out of the. Meeting means you have to put in. The work to figure out what value is in the.
