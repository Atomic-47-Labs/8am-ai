- id: u70
  speaker: Hanif Janmohamed
  t_start: 515.23
  t_end: 589.02
  text: And so they connect to smartphone and then you're off to the races on the platform. So let me just walk through this little presentation. So basically we can imprint maps on any kind of stone. We use this immersion printing, hydrographic printing to get it on. It's pigment based and then there's a clear coat. So they're very durable. We've created a composer, a browser based composer interface which allows you to work with a bunch of map styles. I could show you that if you guys want. And basically you compose the stone and then you can to send off the order. We embed a NTAG 424 DNA, which is a product authenticating chip. So and we also put in these three words, so if you don't have a NFC reader on your phone, you can do it manually. And we see this as the opportunity is to create a conversational AI agent whom we did a little prototype.
- id: u71
  speaker: David Olsson
  t_start: 591.0
  t_end: 591.5
  text: So.
- id: u72
  speaker: Hanif Janmohamed
  t_start: 591.24
  t_end: 744.09
  text: You can get into a relational conversation with the stone and the stone becomes what we call a planetary emissary. There's a couple of ways to create a network. One is through the sharing of a stone, so that connects people. That's a more serendipitous network. We call it an affinity network. And the second kind is two stones connecting on one phone or two devices in one location. So you can create kind of expanding networks of your stone or pairing through pairing. So what we see is a kind of opportunity between the physical and virtual engagement to create an interconnected distributed intelligence with the AI to really get us more grounded into an understanding of the shared space that we have, the planet. So a more eco conscious engagement with the virtual world. So yeah, our vision is a novel, intentional networks of decentralized eco conscious change makers. One of the things we did in our research papers was look at said network formation. And one of the things that was kind of interesting was the idea of weak ties, which is a term created by one of the researchers. And it relates to, you know, how, to how innovation moves in and out of siloed networks. And so we felt this was one kind of good way for us to look at network formation. So that's a key piece for us and we've applied to create a BC for funding for pilots. And what we see with that is 144 stones distributed in Vancouver or B.C. circulating in kind of diverse communities. And that's our learning experience. And the ask here is to try to put together a collective jam for building this infrastructure structure for the circulation of the maps for the stones. There's an AI tech stack to build a platform and a scalable framework for the emergent AI. We did some proof of concepts of.
- id: u73
  speaker: Jason Kryski
  t_start: 744.09
  t_end: 744.59
  text: These.
- id: u74
  speaker: Hanif Janmohamed
  t_start: 746.29
  t_end: 815.58
  text: And our big vision is to harness AI to create a relational and rewarding human exchange that takes us out of social media and brings us into a more engaged dialogue, which we think is missing. And we also see learning from the pilot, how it works, what works, what doesn't, and growing from there to create a big, you know, more a larger crowdfunded initiative. And our big picture vision is that we do a bit of enlightened capitalism here and from the revenues of the project we fund eco conscious network initiatives and we also support a foundation for good works for the planet. So that's our picture. And we've applied for funding from Canada Council and Creative bc. We should know sometime in September. So that's kind of where we're at.
