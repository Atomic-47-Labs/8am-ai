  text: I I think one I mean everybody uses AI in this one pattern for sure and and I I take the metaver version of the pattern. So the one pattern everyone uses AI for summarization, right? like you've got something you've got something you need to understand. You know, it reads really fast, right? So, you can give it a whole bunch of documentation and then you can ask questions about it. But I I do this thing that I think of I and I and I think about it this way because I find it makes the AI more useful if I think about it this way. And that is I I call it metascoping. And so so I summarize which is like take this big thing and give me the important details and then I do the opposite, right? where like I like oh whatever part I don't understand I ask it to flush out right or or or describe so it's kind of doing this constant stepping forward stepping back stepping forward stepping back until I have like because I I'm almost always heading towards complete slashfunctional documentation or context right like the whole thing actually being mapped out so it can so it can adhere to something right and so you often I start with like well you know describe most generally what it is I'm building right and then and then if AI is like really good at like pulling out the key details and then any details you know because like we do the same thing right we have it all in our head we're not like rereading it all at once but it's just able to do that faster and go micro right like pull details back out and then flush out those details details. So, it's very good at building building plans and plans for me often turned into I don't always call them this, but they often turn into workflows, right? So, um you know, sometimes a workflow doesn't look like a workflow, but I think it's still a workflow because like you think of a workflow as like a human workflow, but it can really be like a functional workflow or a data workflow or or that sort of thing. So I just find and and it's something about the fact that um I think I think it's that I'm lazy and AI isn't right like in the sense that like if I tell AI to like map slashdraw slashdocument every step it will right and whereas you know as a person I'm often if I don't do this process if I don't have the option to do with AI, I can be lazy about it, right? Like I say, oh well, approximately going to go through these steps in the workflow and I have a vague idea and that's good enough. And it really isn't, right? Because when you're writing code, you're you're then you're doing many steps past just documenting the workflow. You're actually like building the workflows, building the the functional parts and all the rest. And so that's how I use it. I call it metascoping because I'm zeroing in and zooming out in sort of an iterative pattern depending on, you know, where I need to be. And now, so something I've been talking with David about is that the process itself has sort of become a process. That process of sort of zoomi
