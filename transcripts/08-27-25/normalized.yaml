  t_end: 3552.0
  text: Another thing that they do to avoid context rot, which is a function of just the way these LLMs work is they like positive instructions versus negative instructions. So often when they do the condensation, they will exchange the negative instruction to positive instructions, if you know what I mean. Optimists, rather than say don't do this, they say do this because it just, it creates less problems somehow.
