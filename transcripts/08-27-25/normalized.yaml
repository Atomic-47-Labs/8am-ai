  t_start: 3274.0
  t_end: 3318.0
  text: It's about getting that the hard problem is what exact context needs to be in the context window of your agent at the time of execution, at the time that the output is being generated. And that's like the art of it. Yeah, that's what we're trying to figure out. So that's why we've honed in on like the notion of a conversation as at least a starting point, because it makes so much sense in the context of marketing communication is that if we have that context, well, then we can expand out into other data points about the business generally that might make sense to ingest in the context window at runtime.
