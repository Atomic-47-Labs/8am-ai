  text: Yeah. Oh, I just wanted to ask. A few weeks ago were talking about context rot and it seems like context is so crucial to that workflow. Do you have any like secrets for like how have you come to like, context seems so crucial to what you've presented there. How are you, how are you sort of, I don't know, getting it to a point that it's usable when you're continuously adding to it. It's probably worded, but so like one.
