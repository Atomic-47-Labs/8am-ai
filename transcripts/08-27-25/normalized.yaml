- id: u163
  speaker: Fulvio Ciano
  t_start: 3321.0
  t_end: 3350.0
  text: The general strategy towards removing context rot, because it's. It is a function of ever increasing context. It's context growing and growing. Right. And so is generally. And you see it in play all the time with lots of applications. The big one is in, you know, the context you have for a code base, right. Context creeps in as that context gets bigger and bigger. And generally what the strategy that's used in that space in that thing is, you know, summarization.
- id: u164
  speaker: Spencer MacBeth
  t_start: 3351.0
  t_end: 3352.0
  text: Right.
- id: u165
  speaker: Fulvio Ciano
  t_start: 3351.0
  t_end: 3374.0
  text: You take, when you know you're a preaching. When you know you're preaching a certain approaching. Excuse me, I'm very tired. Approaching the limit of the context window. You, you take the whole conversation, summarize it, condense it. Right. And then start a new context window. Right. So throw everything out and just use the summarization. Right.
- id: u166
  speaker: Ashley Beckett
  t_start: 3373.0
  t_end: 3386.0
  text: So yeah, so this is where you have like, it's very important to have that context summary. Agent is a separate sort of identity, I guess who can like do that, translate that for a way for the model to take the next step.
- id: u167
  speaker: Fulvio Ciano
  t_start: 3387.0
  t_end: 3422.0
  text: That's right. That's right. So, and you don't have to have it. I shouldn't say this because there is more than one approach to this. You don't have to have it live doing it all the time. You really only need a metric to know when you're reaching a certain threshold of the size of your context. It's not an agent has to be running all the time. It's like a hooked event that happens before you reset your context window. The last thing you do before you reset your context window is condensed and store, then open your new context window and dump in the fresh context.
- id: u168
  speaker: Ashley Beckett
  t_start: 3423.0
  t_end: 3424.0
  text: That makes a lot of sense.
- id: u169
  speaker: Fulvio Ciano
  t_start: 3425.0
  t_end: 3491.0
  text: That's generally how it's done. I say that is the approach being used to address the context problem. There's articles on it, so forth and all the rest. And you see it recently in some very specific tools that have not just done this, but documented that this is what's going on and that's how the approach is being done. The problem is that all the models are changing their context window sizes and they're a point and their approach to attention, context attention, which also affects this because you have sliding attention and focused attention and these other strategies that also affect this. But, and I will tell you that as a graph, I think I showed to James at one point, or maybe I meant to show to James because I think he asked about context rot and that is it is a mappable graph. Right. So is not very common when you have a small context window and the amount of rot increases as you approach the limit. And so generally people say at the, you know, at the 60 to 70% threshold, you should be thinking about stopping and condensing and you know, starting a new thing.
- id: u170
  speaker: Spencer MacBeth
  t_start: 3492.0
  t_end: 3507.0
  text: Thankfully, SMS conversations are pretty short in our use case and like the context windows of the models are like 300 to 500 pages of written text. So like we don't have people carrying on novels with full rag.
