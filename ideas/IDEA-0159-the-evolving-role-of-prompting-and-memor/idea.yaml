  excerpt: Fulvio Ciano suggested that the level of human contribution to the workflow will change significantly as the capabilities and memory of LLMs improve (00:22:49). They explained that increased memory and agentic capabilities will allow the models to handle more steps autonomously, leading to more philosophical prompting that provides direction rather than minute orchestration (00:23:52) (00:28:56). Fulvio Ciano acknowledged that when systems break, users are forced to take over the orchestration job and become the prompter, which is time-consuming and risks mistakes (00:24:55).
