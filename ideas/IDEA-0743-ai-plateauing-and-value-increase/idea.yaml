  excerpt: David Olsson discussed the idea of AI potentially plateauing, although their current experience suggests otherwise, with a focus on figuring out the value increase of AI adoption within their company and commercially. Olsson noted that the professional view involves identifying a "runway" for service in the market, but the more interesting aspects involve random, innovative applications. They also emphasized that if people do not learn to use AI, they may struggle to find opportunities, a perspective shared by a colleague teaching at UBCO.
