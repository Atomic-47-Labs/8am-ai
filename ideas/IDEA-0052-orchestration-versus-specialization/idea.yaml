  excerpt: David Olsson introduces the concept of "orchestration over specialization," arguing that specialization functions like the "deskilling" of a factory worker. They define work outputs as either functions or variables, suggesting that individuals often incorrectly equate their identity with the variable—the report produced—rather than the function (00:07:59).
