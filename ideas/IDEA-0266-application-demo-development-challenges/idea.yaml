  excerpt: Scott Morton demonstrated an investor management application built using Supabase, React, and Vite, with AI-generated code. The app features login, investor data management, transaction matching, and summary tables for board reporting. Scott described a bug where editing a record requires re-entering all fields, highlighting limitations in AI-generated code and the need for manual troubleshooting. Development with AI tools significantly accelerated the process, reducing what would have taken a month to about 11 hours (plus troubleshooting).
