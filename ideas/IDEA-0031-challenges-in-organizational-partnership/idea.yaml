  excerpt: David Olsson discussed the precarious position of a consultant when partnering with larger organizations, noting that the partner's ability to operationalize and consume what is offered can quickly usurp or absorb the consultant's role. They highlighted that sometimes when a consultant offers to do work, the partner simply learns what needs to be done and assigns the tasks internally, which underscores the challenge of maintaining authority in such partnerships (00:02:58).
