  excerpt: David Olsson described the difficulty in working with feedback and comments in the current LLM workflow, where criticisms like "this needs to change" do not always provide enough context for effective iteration (00:07:16). They suggested that the fluency provided by LLM tools can obscure true productivity, making the feedback loop interesting but not always useful because the individual providing the work might simply throw the comments back at the LLM to fix without internalizing the necessary rigor (00:08:21).
