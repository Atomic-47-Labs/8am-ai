  excerpt: 'David Olsson shared a personal project demonstrating the innovative potential of AI: creating a motion capture (mocap) yoga application in the browser. Olsson detailed how they used a simple script and text-to-speech to develop an application that tracks stillness in poses to progress through a yoga session, highlighting this as a "joyful part" of working with AI outside of their rigorous professional projects. Olsson contrasted this personal exploration with their day job in quality control for oil and gas, expressing hope and admiration for the capabilities of tools like ChatGPT.'
