  excerpt: Hanif Janmohamed noted that working with AI feels like a "constantly evolving paradigm" and that they are impressed by how they can leverage their intuition and get feedback from their AI collaborator. David Olsson described a method called "signal harvesting," where a series of AI skills examines conversations and documents across various platforms (Slack, Notion, Gmail, repos) to find "the glue" and "synergies" that provide collective feedback and expose structure in the communication.
