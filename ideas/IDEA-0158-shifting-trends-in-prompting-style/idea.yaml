  excerpt: David Olsson shared research suggesting that programmers are becoming less precise and more vague in their prompting because the infrastructure is more capable of handling it. This shift means people are relying on the workflow to be solid, often trying multiple things in parallel (like 1x, 4x, or 16x runners in CodeX) rather than relying on a single, detailed prompt (00:20:39) (00:24:55). They believe future prompting will be "super light" because the system will learn itself (00:21:48).
