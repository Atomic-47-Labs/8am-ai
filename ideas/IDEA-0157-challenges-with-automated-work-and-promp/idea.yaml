  excerpt: Fulvio Ciano expressed hesitation about increased automation using tools like Gemini CLI because they lose visibility into the process and fear breaking the flow without knowing it (00:16:50). David Olsson shared a similar frustration with excessive permission prompts in Claude code and admitted to installing a plugin to automatically approve dangerous command-line interface (CLI) calls to avoid hitting "yes" constantly (00:17:53). Fulvio Ciano highlighted the danger of developing a habit of accepting all prompts, which could lead to accidental destruction of work (00:18:57).
