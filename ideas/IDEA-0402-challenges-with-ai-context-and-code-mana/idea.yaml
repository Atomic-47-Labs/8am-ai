  excerpt: Fulvio Ciano expressed frustration with managing AI context, particularly when dealing with complex code and documentation updates. They noted that incorrect information in the AI's context can propagate and worsen issues. Fulvio suggested keeping code and context in separate repositories to avoid issues where code advances but context is corrupted, and proposed the idea of an agent to alert users when these two are out of sync.
