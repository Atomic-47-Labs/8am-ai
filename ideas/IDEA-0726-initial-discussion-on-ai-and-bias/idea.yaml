  excerpt: David Olsson began the meeting by sharing a visual representation of Emily, an AI creating its memories, which involved a graph illustrating relationships and biases in defining concepts like "joyful". He noted that the value of the AI system, from his perspective, is based on the bias built into it. The speaker questioned the reception of AI tools, suggesting that users often experience them without questioning the underlying bias, and that reflective output from AI often simply confirms existing input.
