  excerpt: Juan Rojas identified people as a major blocker, particularly in getting team members up to speed and thinking differently about new tools (00:04:21). They explained that developers struggle to grasp the value of having a "meta repository" and the complexity of retrieving information, often lacking the experience to know what questions to ask when troubleshooting (00:05:40). This lack of understanding of underlying concepts like asynchronous queues means they cannot identify where issues are broken within microservices (00:06:48).
