  excerpt: David Olsson elaborated that the work of his team involves trying to "beat the bias out of these systems" by treating it as pure compute, analyzing research papers for chemical structures in the cheminformatics industry. They are focused on making data functional, which contrasts with working with information, as they believe data has less bias than information. He mentioned that the work involves science and engineering levels, concentrating on knowledge and reasoning rather than emotional impact, even though related discussions later in the week may be emotionally based.
