  excerpt: Jason Kryski reflected that the "typical agile structure" is not working for their four-person team, noting they are probably operating at only 70% of their capability despite moving quickly, leading them to consider rebuilding their system based on foundational principles (00:30:44). Fulvio Ciano observed that everyone appears to be normalizing to a high level of understanding of the whole, rather than their specialized piece, which is challenging for people trained in the previous paradigm that relied on compartmentalized roles (e.g., PM, QA, UX/UI) (00:32:52).
