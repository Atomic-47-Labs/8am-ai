  excerpt: James Giroday questioned whether data sovereignty requires a Canadian AI model for inference (00:16:29). Carol Wilder clarified that inferencing can be done locally and that systems can be designed to separate data from compute, only sending insights, which is crucial for sensitive data like defense information (00:18:43). David Olsson added that this pattern of separating data from insights has been used in market research for decades, but the underlying business practices for monetizing metadata often remain obscured (00:19:41).
