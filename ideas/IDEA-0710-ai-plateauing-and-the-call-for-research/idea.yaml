  excerpt: David Olsson reported on the current industry conversation, which suggests the transformer approach to AI is plateauing and will not achieve Artificial General Intelligence (AGI). They indicated that the thought leaders believe the incremental gains will diminish and become more costly, leading some early researchers, like Ilya, to call for a return to fundamental research. David Olsson noted that the investment in data centers to power these large language models (LLMs) represents a brute force approach, which is not sustainable long-term.
