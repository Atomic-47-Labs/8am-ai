  excerpt: David Olsson and Jason Kryski explained the nuances of privacy with AI models. They clarified that while some paid plans or API usage might prevent data from being used for training, it does not guarantee "zero privacy" as companies still analyze user data for business insights and profiling (00:37:17). They emphasized that cloud services, despite privacy agreements, still utilize data in ways they deem permissible, often owning "derivative data" or "insights" generated from user data (00:41:25).
