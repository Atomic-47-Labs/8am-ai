  excerpt: David Olsson recalled that previous attempts to leverage transcripts for the cohort, in discussion with James, stalled due to concerns around consent. Although internal consent is informally present, formalizing the process by discussing it explicitly made consent a "big issue," which they plan to resolve by including a mandatory checkbox for consenting to share the survey data on an external platform. David Olsson emphasized the importance of having an automated system for survey analysis and feedback.
