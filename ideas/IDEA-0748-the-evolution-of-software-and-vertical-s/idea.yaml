  excerpt: Jason Kryski questioned the long-term viability of vertical SaaS (Software as a Service) as an interim stage, noting that the market is currently seeing a "slow roll" of AI application despite criticism about the lack of immediate value creation and automation. Fulvio Ciano agreed that current methods will change, suggesting a transition state is necessary to gain workflow insights, but ultimately predicting "a lot less software". Jason Kryski stressed that the path will be interrupted, and infrastructure built now is likely to be invalidated by future disruptions.
